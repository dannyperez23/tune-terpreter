<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='output.css') }}">
    <title>Tune-Terpreter</title>
</head>
<body class="min-h-screen bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-50">
    <div class="max-w-4xl mx-auto px-4 py-8">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold">Tune-Terpreter</h1>
            <button id="theme_button" type="button" aria-label="Toggle theme"
                class="p-2 rounded-lg hover:bg-gray-200 dark:hover:bg-gray-800 transition-colors">
                <svg id="moon_icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" 
                    class="dark:hidden size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 
                        0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 
                        9.753 0 0 0 9.002-5.998Z" />
                </svg>
                <svg id="sun_icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" 
                    class="hidden dark:block size-6">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 
                        6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 
                        0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                </svg>
            </button>
        </div>

        <form id="search_form" class="flex flex-col space-y-3 mb-8">
            <input id="song_search_box" type="search" placeholder="Enter song name..." aria-label="Search for song"
                class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none
                dark:bg-gray-800 dark:border-gray-600">

            <input id="artist_search_box" type="search" placeholder="Enter artist name..." aria-label="Search for artist"
                class="w-full px-4 py-2 border-2 border-gray-300 rounded-lg focus:border-blue-500 focus:outline-none
                dark:bg-gray-800 dark:border-gray-600">

            <button id="search_button" type="submit"
            class="w-full px-6 py-2 bg-blue-600 text-white font-medium rounded-lg hover:bg-blue-700 transition-colors cursor-pointer">
                Search
            </button>
        </form>

        <div id="error_display" 
            class= "hidden mb-4 p-4 bg-red-50 border-l-4 border-red-500 text-red-800 rounded-r-lg
            dark:bg-red-900/30 dark:text-red-300">
            <p>Error Message</p>
        </div>

        <div id="loading_display" 
            class="hidden mb-4 p-4 text-center text-gray-600
            dark:text-gray-400">
            <p>loading... </p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
            <div class="bg-white p-6 shadow-sm border border-gray-200 rounded-lg
                dark:bg-gray-800 dark:border-gray-700">
                <h2 class="text-xl font-semibold mb-3">Lyrics</h2>
                <p id="lyrics_box" class="whitespace-pre-wrap"></p>
            </div>
            
            <div class="bg-white p-6 shadow-sm border border-gray-200 rounded-lg
                dark:bg-gray-800 dark:border-gray-700">
                <h2 class="text-xl font-semibold mb-3">Interpretation</h2>
                <p id="summary_box" class="whitespace-pre-wrap"></p>
            </div>
        </div>

    </div>
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
